<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Банк тестов — СӘТТІ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="satti-tokens.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="satti-components.jsx"></script>
<script type="text/babel" src="admin-shell.jsx"></script>
</head>
<body>
<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#FBFAF7"/>
  <rect x="30" y="30" width="40" height="40" rx="9" fill="#0F766E"/>
  <text x="50" y="50" dominant-baseline="central" text-anchor="middle" font-family="Georgia, 'Lora', serif" font-size="15" font-weight="700" fill="#ffffff">СӘ</text>
</svg>
</template>

<div id="root"></div>
<script type="text/babel">

// Language pill (Рус / Қаз) — same as admin-candidates.html
function LangPill({ lang }) {
  const ru = lang === 'ru';
  return React.createElement('span', { style: { display: 'inline-flex', padding: '3px 10px', borderRadius: 999, fontSize: 12, fontWeight: 700, letterSpacing: '0.04em', background: ru ? 'rgba(94,110,107,0.1)' : 'var(--primary-light)', color: ru ? 'var(--muted)' : 'var(--primary)' } }, ru ? 'Рус' : 'Қаз');
}

function Tests() {
  const { t } = useLang();
  const [q, setQ] = React.useState('');
  const [page, setPage] = React.useState(1);

  const go = () => { window.location.href = 'admin-question-editor.html'; };

  const rowsBase = [
    { n: 1, name: t('Сетевой администратор', 'Желілік әкімші'), prof: t('Сетевой администратор', 'Желілік әкімші'), ork: 5, lang: 'ru', count: 40, pass: 70, st: 'passed', stLabel: t('Опубликован', 'Жарияланған') },
    { n: 2, name: t('Системный администратор', 'Жүйелік әкімші'), prof: t('Системный администратор', 'Жүйелік әкімші'), ork: 5, lang: 'ru', count: 35, pass: 70, st: 'passed', stLabel: t('Опубликован', 'Жарияланған') },
    { n: 3, name: t('Специалист по ИБ', 'АҚ маманы'), prof: t('Специалист по ИБ', 'АҚ маманы'), ork: 6, lang: 'kz', count: 45, pass: 75, st: 'passed', stLabel: t('Опубликован', 'Жарияланған') },
    { n: 4, name: t('Администратор БД', 'ДҚ әкімшісі'), prof: t('Администратор БД', 'ДҚ әкімшісі'), ork: 5, lang: 'ru', count: 30, pass: 70, st: 'draft', stLabel: t('Черновик', 'Жоба') },
    { n: 5, name: t('Инженер по ИВС', 'ЕЖ инженері'), prof: t('Инженер по ИВС', 'ЕЖ инженері'), ork: 6, lang: 'ru', count: 50, pass: 70, st: 'passed', stLabel: t('Опубликован', 'Жарияланған') },
    { n: 6, name: t('Техник по обслуживанию', 'Қызмет көрсету технигі'), prof: t('Техник по обслуживанию компьютерных устройств', 'Компьютерлік құрылғыларға қызмет көрсету технигі'), ork: 4, lang: 'kz', count: 25, pass: 65, st: 'draft', stLabel: t('Черновик', 'Жоба') },
  ];

  return React.createElement(AdminShell, { active: 'tests' },
    React.createElement('div', { style: { maxWidth: 1200, margin: '0 auto', padding: '32px 28px' } },
      // Header
      React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 16, marginBottom: 24, flexWrap: 'wrap' } },
        React.createElement('div', null,
          React.createElement('h1', { style: { fontFamily: 'var(--font-heading)', fontSize: 'var(--h1)', fontWeight: 600, marginBottom: 6 } }, t('Банк тестов', 'Тест банкі')),
          React.createElement('p', { style: { fontSize: 16, color: 'var(--muted)' } }, t('Управление тестами по профессиям', 'Кәсіптер бойынша тестерді басқару')),
        ),
        React.createElement(Btn, { icon: Icons.plus, onClick: () => { window.location.href = 'admin-create-test.html'; } }, t('Создать тест', 'Тест құру')),
      ),

      // Toolbar
      React.createElement('div', { style: { display: 'flex', gap: 12, marginBottom: 20, flexWrap: 'wrap', alignItems: 'center' } },
        React.createElement('div', { style: { position: 'relative', flex: '1 1 260px', minWidth: 200 } },
          React.createElement('span', { style: { position: 'absolute', left: 14, top: '50%', transform: 'translateY(-50%)', color: 'var(--muted)', display: 'flex' } }, Icons.search),
          React.createElement('input', { placeholder: t('Поиск по названию или профессии…', 'Атауы немесе кәсібі бойынша іздеу…'), value: q, onChange: e => setQ(e.target.value),
            style: { width: '100%', height: 44, padding: '0 16px 0 44px', fontFamily: 'var(--font-body)', fontSize: 15, color: 'var(--ink)', background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 10, outline: 'none' },
            onFocus: e => { e.target.style.borderColor = 'var(--primary)'; e.target.style.boxShadow = '0 0 0 3px rgba(15,118,110,0.1)'; },
            onBlur: e => { e.target.style.borderColor = 'var(--border)'; e.target.style.boxShadow = 'none'; },
          }),
        ),
        React.createElement(FormSelect, { value: '', onChange: () => {}, placeholder: t('Все статусы', 'Барлық мәртебелер'), options: [t('Опубликован', 'Жарияланған'), t('Черновик', 'Жоба')] }),
        React.createElement(FormSelect, { value: '', onChange: () => {}, placeholder: t('Все языки', 'Барлық тілдер'), options: [t('Русский', 'Орысша'), t('Казахский', 'Қазақша')] }),
      ),

      // Table
      React.createElement(DataTable, {
        onRowClick: go,
        columns: [
          { key: 'n', label: '№', render: r => React.createElement('span', { style: { color: 'var(--muted)', fontWeight: 600, fontVariantNumeric: 'tabular-nums' } }, r.n) },
          { key: 'name', label: t('Название теста', 'Тест атауы'), render: r => React.createElement('span', { style: { fontWeight: 600 } }, r.name) },
          { key: 'prof', label: t('Профессия', 'Кәсіп'), render: r => React.createElement('span', { style: { fontSize: 14, color: 'var(--muted)' } }, r.prof) },
          { key: 'ork', label: t('Уровень ОРК', 'ҰБШ деңгейі'), render: r => React.createElement('span', { style: { fontWeight: 600, fontVariantNumeric: 'tabular-nums' } }, r.ork) },
          { key: 'lang', label: t('Язык', 'Тіл'), render: r => React.createElement(LangPill, { lang: r.lang }) },
          { key: 'count', label: t('Вопросов', 'Сұрақтар'), render: r => React.createElement('span', { style: { fontVariantNumeric: 'tabular-nums' } }, r.count) },
          { key: 'pass', label: t('Проходной балл', 'Өту балы'), render: r => React.createElement('span', { style: { fontWeight: 600, fontVariantNumeric: 'tabular-nums' } }, r.pass + '%') },
          { key: 'st', label: t('Статус', 'Мәртебесі'), render: r => React.createElement(StatusPill, { status: r.st, label: r.stLabel }) },
          { key: 'a', label: '', render: r => React.createElement('button', { onClick: e => { e.stopPropagation(); window.location.href = 'admin-question-editor.html'; }, title: t('Редактировать', 'Өңдеу'),
              style: { background: 'none', border: 'none', cursor: 'pointer', color: 'var(--muted)', display: 'flex', padding: 6, borderRadius: 8 },
              onMouseEnter: e => { e.currentTarget.style.color = 'var(--primary)'; e.currentTarget.style.background = 'var(--primary-light)'; },
              onMouseLeave: e => { e.currentTarget.style.color = 'var(--muted)'; e.currentTarget.style.background = 'none'; },
            }, Icons.edit) },
        ],
        rows: rowsBase,
      }),

      React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: 20, flexWrap: 'wrap', gap: 12 } },
        React.createElement('span', { style: { fontSize: 14, color: 'var(--muted)' } }, t('Показано 6 из 6', '6-дан 6 көрсетілді')),
        React.createElement(Pagination, { current: page, total: 1, onChange: setPage }),
      ),
    )
  );
}

function App() {
  return React.createElement(LangProvider, null, React.createElement(Tests));
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
</body>
</html>
