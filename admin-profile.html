<script type="text/babel">

function Profile() {
  const { t } = useLang();
  const [name, setName] = React.useState(t('Оспанов Ислам', 'Оспанов Ислам'));
  const [email] = React.useState('i.ospanov@satti.kz');
  const [phone, setPhone] = React.useState('+7 701 234 56 78');
  const [notifNew, setNotifNew] = React.useState(true);
  const [notifDigest, setNotifDigest] = React.useState(false);

  const SectionCard = ({ title, children }) => React.createElement(Card, { style: { marginBottom: 20 } },
    React.createElement('h2', { style: { fontFamily: 'var(--font-heading)', fontSize: 20, fontWeight: 600, marginBottom: 20 } }, title),
    children
  );


  return React.createElement(AdminShell, { active: 'profile' },
    React.createElement('div', { style: { maxWidth: 820, margin: '0 auto', padding: '32px 28px' } },
      React.createElement('h1', { style: { fontFamily: 'var(--font-heading)', fontSize: 'var(--h1)', fontWeight: 600, marginBottom: 6 } }, t('Профиль', 'Профиль')),

        ),
        React.createElement(Btn, { variant: 'secondary', size: 'sm', icon: Icons.image }, t('Сменить фото', 'Фотоны өзгерту')),
      ),

        React.createElement('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(220px, 1fr))', gap: '0 16px' } },

        React.createElement('button', { onClick: () => window.location.href = 'login.html', style: { display: 'inline-flex', alignItems: 'center', gap: 8, background: 'none', border: 'none', color: 'var(--danger)', fontSize: 15, fontWeight: 600, cursor: 'pointer', padding: 12 } }, Icons.logOut, t('Выйти из системы', 'Жүйеден шығу')),

</script>
