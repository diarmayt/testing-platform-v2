<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личный кабинет — СӘТТІ</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="satti-tokens.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="satti-components.jsx"></script>
</head>
<body>
<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <rect width="100" height="100" fill="#FBFAF7"/>
  <rect x="30" y="30" width="40" height="40" rx="9" fill="#0F766E"/>
  <text x="50" y="50" dominant-baseline="central" text-anchor="middle" font-family="Georgia, 'Lora', serif" font-size="15" font-weight="700" fill="#ffffff">СӘ</text>
</svg>
</template>

<div id="root"></div>
<script type="text/babel">

function Stepper({ steps }) {
  const { t } = useLang();
  return React.createElement('div', { style: { display: 'flex', alignItems: 'flex-start', gap: 0, flexWrap: 'nowrap', overflowX: 'auto', paddingBottom: 4 } },
    steps.map((s, i) => React.createElement(React.Fragment, { key: i },
      React.createElement('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 8, minWidth: 92, flexShrink: 0 } },
        React.createElement('div', { style: {
          width: 40, height: 40, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontWeight: 700, fontSize: 15, flexShrink: 0,
          background: s.state === 'done' ? 'var(--success)' : s.state === 'active' ? 'var(--primary)' : 'var(--surface)',
          color: s.state === 'pending' ? 'var(--muted)' : '#fff',
          border: s.state === 'pending' ? '2px solid var(--border)' : 'none',
        } }, s.state === 'done' ? Icons.check : (i + 1)),
        React.createElement('div', { style: { textAlign: 'center' } },
          React.createElement('div', { style: { fontSize: 13, fontWeight: 600, color: s.state === 'pending' ? 'var(--muted)' : 'var(--ink)', lineHeight: 1.3 } }, s.label),
          React.createElement('div', { style: { fontSize: 11, color: 'var(--muted)', marginTop: 2 } }, s.sub),
        )
      ),
      i < steps.length - 1 && React.createElement('div', { style: { flex: 1, height: 2, background: steps[i+1].state !== 'pending' || s.state === 'done' ? 'var(--success)' : 'var(--border)', marginTop: 19, minWidth: 24 } })
    ))
  );
}

function CandidateCabinet() {
  const { t } = useLang();

  return React.createElement('div', { style: { minHeight: '100dvh', display: 'flex', flexDirection: 'column' } },
    React.createElement(SattiHeader, { variant: 'candidate', avatarInitials: 'АК' }),
    React.createElement('main', { style: { flex: 1 } },
      React.createElement('div', { style: { maxWidth: 920, margin: '0 auto', padding: '32px 24px' } },

        // Welcome
        React.createElement('div', { style: { marginBottom: 28 } },
          React.createElement('h1', { style: { fontFamily: 'var(--font-heading)', fontSize: 'var(--h1)', fontWeight: 600, marginBottom: 6 } }, t('Здравствуйте, Александр', 'Сәлеметсіз бе, Александр')),
          React.createElement('p', { style: { fontSize: 16, color: 'var(--muted)' } }, t('Ваша процедура оценки квалификации в процессе прохождения', 'Біліктілікті бағалау рәсіміңіз өту үстінде')),
        ),

        // Active procedure card
        React.createElement(Card, { padding: 0, style: { marginBottom: 24, overflow: 'hidden' } },
          React.createElement('div', { style: { padding: '24px 28px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: 16, flexWrap: 'wrap' } },
            React.createElement('div', { style: { minWidth: 0, flex: '1 1 240px' } },
              React.createElement('div', { style: { fontSize: 12, fontWeight: 700, color: 'var(--accent)', letterSpacing: '0.05em', textTransform: 'uppercase', marginBottom: 6 } }, t('Активная процедура', 'Белсенді рәсім')),
              React.createElement('h2', { style: { fontFamily: 'var(--font-heading)', fontSize: 22, fontWeight: 600, lineHeight: 1.25, marginBottom: 8 } }, 'Сетевой администратор'),
              React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 8, fontSize: 14, color: 'var(--muted)' } },
                Icons.calendar, React.createElement('span', null, t('Срок: до 30 окт 2026', 'Мерзімі: 30 қаз 2026 дейін')),
              )
            ),
            React.createElement(StatusPill, { status: 'active', label: t('В ПРОЦЕССЕ', 'ПРОЦЕСТЕ') }),
          ),

          React.createElement('div', { style: { padding: '28px' } },
            React.createElement(Stepper, { steps: [
              { label: t('Тест', 'Тест'), sub: t('40 вопросов', '40 сұрақ'), state: 'active' },
              { label: t('Практика', 'Практика'), sub: t('1 задание', '1 тапсырма'), state: 'pending' },
              { label: t('Результат', 'Нәтиже'), sub: t('Сертификат', 'Сертификат'), state: 'pending' },
            ] }),
          ),

          React.createElement('div', { style: { padding: '20px 28px', background: 'var(--primary-lighter)', borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 16, flexWrap: 'wrap' } },
            React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 8, fontSize: 14, color: 'var(--muted)' } },
              Icons.clock, React.createElement('span', null, t('Тест: 60 минут · 40 вопросов · проходной балл 70%', 'Тест: 60 минут · 40 сұрақ · өту балы 70%')),
            ),
            React.createElement(Btn, { iconRight: Icons.arrowRight, onClick: () => window.location.href = 'test-start.html' }, t('Начать тестирование', 'Тестілеуді бастау')),
          ),
        ),


      )
    ),
    React.createElement(SattiFooter, null),
  );
}

function App() {
  return React.createElement(LangProvider, null, React.createElement(CandidateCabinet));
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));

</script>
</body>
</html>
